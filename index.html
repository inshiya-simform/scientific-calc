<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./assets/logo.svg" />
    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scientific Calculator</title>
  </head>
  <body>
    <main>
        <!-- displays result  -->
      <section class="display">
        <h1 id="ans"></h1>
      </section>
      <!-- degree and function expression  -->
      <section class="deg">
        <div>
          <p>DEG</p>
          <p>F-E</p>
        </div>
      </section>
      <!-- memory operations   -->
      <section class="memory-operation">
        <div>
          <button
            name="mc"
            class="light"
            title="Clear Memory"
            aria-label="clear the memory space"
          >
            MC
          </button>
          <button
            name="mr"
            class="light"
            title="Read Memory"
            aria-label="read the stored value from memory"
          >
            MR
          </button>
          <button
            name="m+"
            title="Add Result"
            aria-label="adds the result of the current calculation to the value in the memory cell"
          >
            M+
          </button>
          <button
            name="m-"
            title="Substract Result"
            aria-label="subtracts the result of the current calculation from the value in the memory cell"
          >
            M-
          </button>
          <button
            name="ms"
            title="Save Result"
            aria-label="Saves the result of the calculation to memory"
          >
            MS
          </button>
        </div>
      </section>
      <!-- trignometric functions, floor and ceil  -->
      <section class="functions">
        <div>
          <img
            src="./assets/trignometry.svg"
            alt="trignometry"
            aria-hidden="true"
          />
          <select id="trignometry">
            <option selected disabled hidden id="trigno_func">Trignometry</option>
            <option>sin(x)</option>
            <option>cos(x)</option>
            <option>tan(x)</option>
          </select>
        </div>
        <div>
          <img src="./assets/function.svg" alt="functions" aria-hidden="true" />
          <select id="function">
            <option selected disabled hidden id="func">Functions</option>
            <option>floor(x)</option>
            <option>ceil(x)</option>
          </select>
        </div>
      </section>
      <!-- key operations  -->
      <section class="keys">
        <button name="2nd" class="btn">2<sup>nd</sup></button>
        <button name="pi" class="btn">𝜋</button>
        <button name="e" class="btn">e</button>
        <button name="C" class="btn">C</button>
        <button name="del" class="btn del">
          <img src="./assets/delete.svg" alt="delete"/>
        </button>
        <button name="sqr" class="btn">x<sup id="sqr__change">2</sup></button>
        <button name="div-by-1" class="btn">1/x</button>
        <button name="abs" class="btn">|x|</button>
        <button name="exp" class="btn">exp</button>
        <button name="%" class="btn">mod</button>
        <button name="sqrt" class="btn"><sup id="sqrt__change">2</sup>√x</button>
        <button name="(" class="btn">(</button>
        <button name=")" class="btn">)</button>
        <button name="factorial" class="btn">n!</button>
        <button name="/" class="btn">÷</button>
        <button name="x-pow-y" class="btn">x<sup>y</sup></button>
        <button name="7" class="numbers">7</button>
        <button name="8" class="numbers">8</button>
        <button name="9" class="numbers">9</button>
        <button name="*" class="btn">X</button>
        <button name="10-pow-x" class="btn">10<sup>x</sup></button>
        <button name="4" class="numbers">4</button>
        <button name="5" class="numbers">5</button>
        <button name="6" class="numbers">6</button>
        <button name="-" class="btn">-</button>
        <button name="log" class="btn">log</button>
        <button name="1" class="numbers">1</button>
        <button name="2" class="numbers">2</button>
        <button name="3" class="numbers">3</button>
        <button name="+" class="btn">+</button>
        <button name="ln" class="btn">ln</button>
        <button name="+/-" class="numbers">+/-</button>
        <button name="0" class="numbers">0</button>
        <button name="." class="numbers">.</button>
        <button name="calc" id="calculate">=</button>
      </section>
    </main>
  </body>
  <script src="index.js"></script>
</html>
