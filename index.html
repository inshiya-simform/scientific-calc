<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./assets/logo.svg" />
    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scientific Calculator</title>
  </head>
  <body>
    <main>
      <section class="display">
        <h1>0</h1>
      </section>
      <section class="deg">
        <div>
          <p>DEG</p>
          <p>F-E</p>
        </div>
      </section>
      <section class="memory-operation">
        <div>
          <button class="light" title="Clear Memory" aria-label="clear the memory space">
            MC
          </button>
          <button
            class="light"
            title="Read Memory"
            aria-label="read the stored value from memory"
          >
            MR
          </button>
          <button
            title="Add Result"
            aria-label="adds the result of the current calculation to the value in the memory cell"
          >
            M+
          </button>
          <button
            title="Substract Result"
            aria-label="subtracts the result of the current calculation from the value in the memory cell"
          >
            M-
          </button>
          <button
            title="Save Result"
            aria-label="Saves the result of the calculation to memory"
          >
            MS
          </button>
        </div>
      </section>
      <section class="functions">
        <div>
          <img src="./assets/trignometry.svg" alt="trignometry" />
          <select id="trignometry" onclick="handleDropdownClick()">
            <option value="trignometry">Trignometry</option>
          </select>
        </div>
        <div>
          <img src="./assets/function.svg" alt="functions" />
          <select id="function" onclick="handleDropdownClick()">
            <option value="fucntion">Functions</option>
          </select>
        </div>
      </section>
      <section class="keys">
        <button class="btn">2<sup>nd</sup></button>
        <button class="btn">𝜋</button>
        <button class="btn">e</button>
        <button class="btn">C</button>
        <button class="btn del">
          <img src="./assets/delete.svg" alt="delete" />
        </button>
        <button class="btn">x<sup>2</sup></button>
        <button class="btn">1/x</button>
        <button class="btn">|x|</button>
        <button class="btn">exp</button>
        <button class="btn">mod</button>
        <button class="btn"><sup>2</sup>√x</button>
        <button class="btn">(</button>
        <button class="btn">)</button>
        <button class="btn">n!</button>
        <button class="btn">÷</button>
        <button class="btn">x<sup>y</sup></button>
        <button class="numbers">7</button>
        <button class="numbers">8</button>
        <button class="numbers">9</button>
        <button class="btn">X</button>
        <button class="btn">10<sup>x</sup></button>
        <button class="numbers">4</button>
        <button class="numbers">5</button>
        <button class="numbers">6</button>
        <button class="btn">-</button>
        <button class="btn">log</button>
        <button class="numbers">1</button>
        <button class="numbers">2</button>
        <button class="numbers">3</button>
        <button class="btn">+</button>
        <button class="btn">ln</button>
        <button class="btn">+/-</button>
        <button class="numbers">0</button>
        <button class="btn">.</button>
        <button id="calculate">=</button>
      </section>
    </main>
  </body>
</html>
